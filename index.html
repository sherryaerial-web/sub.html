<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sherry Aerial | 系統管理</title>
  <style>
    /* 高級感極簡配色 (Apple 風格) */
    :root {
      --primary: #1D1D1F;
      --primary-hover: #434344;
      --bg: #F5F5F7;
      --card-bg: #FFFFFF;
      --text-main: #1D1D1F;
      --text-sub: #86868B;
      --border: #D2D2D7;
      --accent: #0071E3; /* 微微的科技藍點綴 */
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      box-sizing: border-box;
      margin-top: 2vh;
    }

    h1 {
      text-align: center;
      color: var(--text-main);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 35px;
      letter-spacing: 0.5px;
    }

    /* 首頁選單按鈕 */
    .btn {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: var(--card-bg);
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .btn:hover {
      border-color: var(--text-main);
      background-color: #FAFAFA;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      margin-top: 25px;
      font-weight: 600;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: scale(0.99);
    }

    /* 精緻版回首頁按鈕 */
    .btn-back {
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border);
      width: auto;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 20px;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      transition: 0.2s;
    }
    .btn-back:hover { 
      background-color: var(--bg); 
      color: var(--text-main);
    }

    /* 標題與表單 */
    h2 { font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 24px; }
    
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 8px; font-weight: 500; }

    /* 客製化極簡下拉選單 */
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text-main);
      background-color: var(--card-bg);
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%24%2024%22%20fill%3D%22none%22%20stroke%3D%22%2386868B%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 12px top 50%;
      background-size: 16px auto;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--accent); }

    /* 清單與核取方塊設計 */
    .list-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card-bg);
    }
    .list-item:hover { border-color: var(--text-sub); }
    
    .list-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .item-details { flex-grow: 1; line-height: 1.4; }
    .item-date { font-weight: 500; color: var(--text-sub); font-size: 13px; margin-bottom: 4px; }
    .item-course { font-size: 15px; color: var(--text-main); font-weight: 600; }
    .item-teacher { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .active-view { display: block; }
    
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 14px; background: var(--bg); border-radius: 12px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app-container">
  <h1>Sherry Aerial Studio</h1>

  <!-- 首頁分流選單 -->
  <div id="view-home" class="view-section active-view">
    <button class="btn" onclick="switchView('view-leave')">請假登記</button>
    <button class="btn" onclick="switchView('view-claim')">尋找與領取代課</button>
    <button class="btn" onclick="switchView('view-mysubs')">查看我的代課紀錄</button>
  </div>

  <!-- 1. 請假登記畫面 -->
  <div id="view-leave" class="view-section">
    <button class="btn-back" onclick="switchView('view-home')">← 返回</button>
    <h2>填寫請假單</h2>
    <div class="form-group">
      <label>請選擇您的名字</label>
      <!-- 加入了 onchange 事件，一換人就過濾課程 -->
      <select id="leave-teacher-select" onchange="renderTeacherCourses()">
        <option value="">載入中...</option>
      </select>
    </div>
    <div id="leave-course-list"><div class="empty-state">請先於上方選擇名字</div></div>
    <button class="btn btn-primary" onclick="submitLeave()">送出請假單</button>
  </div>

  <!-- 2. 領取代課畫面 -->
  <div id="view-claim" class="view-section">
    <button class="btn-back" onclick="switchView('view-home')">← 返回</button>
    <h2>領取代課</h2>
    <div class="form-group">
      <label>代課老師（您自己）</label>
      <select id="claim-teacher-select"><option value="">載入中...</option></select>
    </div>
    <div id="pending-leaves-list"><div class="empty-state">載入中...</div></div>
    <button class="btn btn-primary" onclick="submitClaim()">確認領取勾選課程</button>
  </div>

  <!-- 3. 我的代課查詢畫面 -->
  <div id="view-mysubs" class="view-section">
    <button class="btn-back" onclick="switchView('view-home')">← 返回</button>
    <h2>我的代課紀錄</h2>
    <div class="form-group">
      <label>查詢老師</label>
      <select id="mysub-teacher-select" onchange="fetchMySubs()"><option value="">載入中...</option></select>
    </div>
    <div id="my-subs-list"><div class="empty-state">請先選擇名字以查詢紀錄</div></div>
  </div>

</div>

<script>
  // 🔴🔴🔴 請在這裡換上妳最新部署的 GAS 網址 🔴🔴🔴
  const APP_URL = "https://script.google.com/macros/s/AKfycbyJADHe_DZdNIbfv_KPewAcBekEond-5Fw63i-RWCd1mHl_O9uGAQ-LTnzENZshjnhe/exec";

  // 建立一個全域變數，用來把所有課程存起來，方便前端瞬間篩選
  let globalCourseList = [];

  function switchView(viewId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
    document.getElementById(viewId).classList.add('active-view');
    
    // 清空請假頁面的選擇狀態
    if (viewId === 'view-leave') {
      document.getElementById('leave-teacher-select').value = "";
      document.getElementById('leave-course-list').innerHTML = "<div class='empty-state'>請先於上方選擇名字</div>";
      fetchAllCourses(); // 背景把所有課程抓下來準備
    }
    if (viewId === 'view-claim') fetchPendingLeaves();
  }

  // 載入老師名單
  window.onload = function() {
    fetch(`${APP_URL}?action=getTeachers`)
      .then(res => res.json())
      .then(data => {
        let optionsHtml = '<option value="">請選擇...</option>';
        data.forEach(t => {
          if(t["指導者"]) optionsHtml += `<option value="${t["指導者"]}">${t["指導者"]}</option>`;
        });
        document.getElementById('leave-teacher-select').innerHTML = optionsHtml;
        document.getElementById('claim-teacher-select').innerHTML = optionsHtml;
        document.getElementById('mysub-teacher-select').innerHTML = optionsHtml;
      });
  };

  // 背景抓取所有課程
  function fetchAllCourses() {
    fetch(`${APP_URL}?action=getCourseList`)
      .then(res => res.json())
      .then(data => {
        globalCourseList = data; // 把抓下來的資料存起來
      });
  }

  // 🌟 核心修復：只顯示選定老師的課！
  function renderTeacherCourses() {
    const selectedTeacher = document.getElementById('leave-teacher-select').value;
    const listDiv = document.getElementById('leave-course-list');

    if (!selectedTeacher) {
      listDiv.innerHTML = "<div class='empty-state'>請先於上方選擇名字</div>";
      return;
    }

    if (globalCourseList.length === 0) {
      listDiv.innerHTML = "<div class='empty-state'>資料讀取中，請稍候...</div>";
      setTimeout(renderTeacherCourses, 1000); // 若還沒抓完，等一秒再試
      return;
    }

    // 進行篩選：指導者 === 選單選中的老師
    const myCourses = globalCourseList.filter(item => item["指導者"] === selectedTeacher);

    if (myCourses.length === 0) {
      listDiv.innerHTML = "<div class='empty-state'>您目前沒有課程紀錄</div>";
      return;
    }

    let html = "";
    myCourses.forEach(item => {
      if (!item["日期"]) return;
      let rawData = JSON.stringify(item).replace(/'/g, "&#39;");
      html += `
        <label class="list-item">
          <input type="checkbox" class="chk-leave" data-raw='${rawData}'>
          <div class="item-details">
            <div class="item-date">${item["日期"]}  ${item["時間"]}</div>
            <div class="item-course">${item["課程"]}</div>
          </div>
        </label>`;
    });
    listDiv.innerHTML = html;
  }

  function submitLeave() {
    const teacher = document.getElementById('leave-teacher-select').value;
    const chks = document.querySelectorAll('.chk-leave:checked');
    if (!teacher) return alert("請選擇名字！");
    if (chks.length === 0) return alert("請勾選要請假的課程！");

    const btn = document.querySelector('#view-leave .btn-primary');
    btn.innerText = "處理中..."; btn.disabled = true;

    const items = Array.from(chks).map(el => JSON.parse(el.getAttribute('data-raw')));
    const url = `${APP_URL}?action=submitLeave&instructor=${encodeURIComponent(teacher)}&items=${encodeURIComponent(JSON.stringify(items))}`;

    fetch(url, { mode: 'no-cors' }).then(() => {
      alert("請假登記成功！");
      btn.innerText = "送出請假單"; btn.disabled = false;
      switchView('view-home');
    });
  }

  function fetchPendingLeaves() {
    document.getElementById('pending-leaves-list').innerHTML = "<div class='empty-state'>載入中...</div>";
    fetch(`${APP_URL}?action=getPendingLeaves`)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          document.getElementById('pending-leaves-list').innerHTML = "<div class='empty-state'>目前無待領取的代課</div>";
          return;
        }
        let html = "";
        data.forEach(item => {
          let rawData = JSON.stringify(item).replace(/'/g, "&#39;");
          html += `
            <label class="list-item">
              <input type="checkbox" class="chk-claim" data-raw='${rawData}'>
              <div class="item-details">
                <div class="item-date">${item["日期"]}  ${item["時段"]}</div>
                <div class="item-course">${item["課程"]}</div>
                <div class="item-teacher">原指導者：${item["原老師"]}</div>
              </div>
            </label>`;
        });
        document.getElementById('pending-leaves-list').innerHTML = html;
      });
  }

  function submitClaim() {
    const subTeacher = document.getElementById('claim-teacher-select').value;
    const chks = document.querySelectorAll('.chk-claim:checked');
    if (!subTeacher) return alert("請選擇代課老師（您自己）！");
    if (chks.length === 0) return alert("請勾選要領取的課程！");

    const btn = document.querySelector('#view-claim .btn-primary');
    btn.innerText = "處理中..."; btn.disabled = true;

    const items = Array.from(chks).map(el => JSON.parse(el.getAttribute('data-raw')));
    const url = `${APP_URL}?action=submitClaim&subTeacher=${encodeURIComponent(subTeacher)}&items=${encodeURIComponent(JSON.stringify(items))}`;

    fetch(url, { mode: 'no-cors' }).then(() => {
      alert("成功領取代課！");
      btn.innerText = "確認領取勾選課程"; btn.disabled = false;
      fetchPendingLeaves();
    });
  }

  function fetchMySubs() {
    const teacher = document.getElementById('mysub-teacher-select').value;
    const listDiv = document.getElementById('my-subs-list');
    if (!teacher) { listDiv.innerHTML = "<div class='empty-state'>請先選擇名字以查詢紀錄</div>"; return; }

    listDiv.innerHTML = "<div class='empty-state'>查詢中...</div>";
    fetch(`${APP_URL}?action=getMySubs&name=${encodeURIComponent(teacher)}`)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          listDiv.innerHTML = "<div class='empty-state'>您目前沒有代課紀錄</div>"; return;
        }
        let html = "";
        data.forEach(item => {
          html += `
            <div class="list-item" style="cursor: default; border-color: transparent;">
              <div class="item-details">
                <div class="item-date">${item["日期"]}  ${item["時段"]}</div>
                <div class="item-course">${item["課程"]}</div>
                <div class="item-teacher">原指導者：${item["原老師"]}</div>
              </div>
            </div>`;
        });
        listDiv.innerHTML = html;
      });
  }
</script>
</body>
</html>
