<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sherry Aerial | 系統管理</title>
  <style>
    :root {
      --primary: #1D1D1F;
      --bg: #F5F5F7;
      --card-bg: #FFFFFF;
      --text-main: #1D1D1F;
      --text-sub: #86868B;
      --border: #E5E5E7;
    }
    
    body {
      font-family: -apple-system, "SF Pro Display", "PingFang TC", sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px;
      border-radius: 28px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
      padding: 40px 24px;
      margin-top: 2vh;
    }

    h1 { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 40px; letter-spacing: -0.5px; }
    h2 { font-size: 19px; font-weight: 600; margin-bottom: 24px; color: var(--text-main); }

    .btn {
      width: 100%;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: var(--card-bg);
      color: var(--text-main);
      margin-bottom: 14px;
    }
    .btn:hover { background-color: #FAFAFB; border-color: #AEAEB2; }

    .btn-primary { background-color: var(--primary); color: white; border: none; margin-top: 24px; font-weight: 600; }
    .btn-primary:hover { background-color: #323234; transform: scale(0.99); }

    .btn-back {
      background: #F2F2F7;
      color: #3A3A3C;
      border: none;
      width: auto;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 40px;
      margin-bottom: 30px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .btn-back:hover { background-color: #E5E5EA; }

    .form-group { margin-bottom: 28px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 10px; font-weight: 500; }

    select {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background-color: #FAFAFB;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2386868B%22%20stroke-width%3D%222%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 18px;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .list-item:hover { border-color: #AEAEB2; background-color: #FAFAFB; }
    
    .list-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 18px;
      accent-color: var(--primary);
    }

    .item-details { flex-grow: 1; }
    .item-date { font-weight: 500; color: var(--text-sub); font-size: 13px; margin-bottom: 5px; }
    .item-course { font-size: 16px; color: var(--text-main); font-weight: 600; }
    .item-teacher { font-size: 13px; color: var(--text-sub); margin-top: 5px; }

    .view-section { display: none; animation: fadeIn 0.4s ease-out; }
    .active-view { display: block; }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sub); font-size: 14px; background: #FAFAFB; border-radius: 16px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app-container">
  <h1>Sherry Aerial Studio</h1>

  <!-- 首頁 -->
  <div id="view-home" class="view-section active-view">
    <button class="btn" onclick="switchView('view-leave')">請假登記</button>
    <button class="btn" onclick="switchView('view-claim')">尋找與領取代課</button>
    <button class="btn" onclick="switchView('view-mysubs')">查看我的代課紀錄</button>
  </div>

  <!-- 1. 請假登記 -->
  <div id="view-leave" class="view-section">
    <div class="btn-back" onclick="switchView('view-home')">← 返回</div>
    <h2>填寫請假單</h2>
    <div class="form-group">
      <label>請選擇您的名字</label>
      <select id="leave-teacher-select" onchange="renderTeacherCourses()"><option value="">載入中...</option></select>
    </div>
    <div id="leave-course-list"><div class="empty-state">請先選擇老師</div></div>
    <button class="btn btn-primary" onclick="submitLeave()">送出請假申請</button>
  </div>

  <!-- 2. 領取代課 -->
  <div id="view-claim" class="view-section">
    <div class="btn-back" onclick="switchView('view-home')">← 返回</div>
    <h2>領取代課</h2>
    <div class="form-group">
      <label>代課老師（您自己）</label>
      <select id="claim-teacher-select"><option value="">載入中...</option></select>
    </div>
    <div id="pending-leaves-list"><div class="empty-state">載入中...</div></div>
    <button class="btn btn-primary" onclick="submitClaim()">確認領取勾選課程</button>
  </div>

  <!-- 3. 我的紀錄 -->
  <div id="view-mysubs" class="view-section">
    <div class="btn-back" onclick="switchView('view-home')">← 返回</div>
    <h2>我的代課紀錄</h2>
    <div class="form-group">
      <label>查詢老師</label>
      <select id="mysub-teacher-select" onchange="fetchMySubs()"><option value="">載入中...</option></select>
    </div>
    <div id="my-subs-list"><div class="empty-state">請先選擇名字</div></div>
  </div>
</div>

<script>
  // 🔴🔴🔴 請在這裡換上妳最新部署的 GAS 網址 🔴🔴🔴
  const APP_URL = "https://script.google.com/macros/s/AKfycbyJADHe_DZdNIbfv_KPewAcBekEond-5Fw63i-RWCd1mHl_O9uGAQ-LTnzENZshjnhe/exec";

  let globalCourseList = [];

  function switchView(viewId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
    document.getElementById(viewId).classList.add('active-view');
    if (viewId === 'view-leave') {
      document.getElementById('leave-teacher-select').value = "";
      document.getElementById('leave-course-list').innerHTML = "<div class='empty-state'>請先選擇老師</div>";
      fetchAllCourses();
    }
    if (viewId === 'view-claim') fetchPendingLeaves();
  }

  window.onload = function() {
    fetch(`${APP_URL}?action=getTeachers`).then(res => res.json()).then(data => {
      let options = '<option value="">請選擇...</option>';
      data.forEach(t => { if(t["指導者"]) options += `<option value="${t["指導者"]}">${t["指導者"]}</option>`; });
      document.getElementById('leave-teacher-select').innerHTML = options;
      document.getElementById('claim-teacher-select').innerHTML = options;
      document.getElementById('mysub-teacher-select').innerHTML = options;
    });
  };

  function fetchAllCourses() {
    fetch(`${APP_URL}?action=getCourseList`).then(res => res.json()).then(data => { globalCourseList = data; });
  }

  function renderTeacherCourses() {
    const selected = document.getElementById('leave-teacher-select').value;
    const listDiv = document.getElementById('leave-course-list');
    if (!selected) return;
    const myCourses = globalCourseList.filter(item => item["指導者"] === selected);
    if (myCourses.length === 0) { listDiv.innerHTML = "<div class='empty-state'>目前無課程紀錄</div>"; return; }
    
    let html = "";
    myCourses.forEach(item => {
      let rawData = JSON.stringify(item).replace(/'/g, "&#39;");
      html += `<label class="list-item">
        <input type="checkbox" class="chk-leave" data-raw='${rawData}'>
        <div class="item-details">
          <div class="item-date">${item["日期"]} ${item["時間"]}</div>
          <div class="item-course">${item["課程"]}</div>
        </div>
      </label>`;
    });
    listDiv.innerHTML = html;
  }

  function submitLeave() {
    const teacher = document.getElementById('leave-teacher-select').value;
    const chks = document.querySelectorAll('.chk-leave:checked');
    if (!teacher) return alert("請選擇名字！");
    if (chks.length === 0) return alert("請勾選要請假的課程！");

    const btn = document.querySelector('#view-leave .btn-primary');
    btn.innerText = "處理中..."; btn.disabled = true;

    const items = Array.from(chks).map(el => JSON.parse(el.getAttribute('data-raw')));
    const url = `${APP_URL}?action=submitLeave&instructor=${encodeURIComponent(teacher)}&items=${encodeURIComponent(JSON.stringify(items))}`;

    fetch(url, { mode: 'no-cors' }).then(() => {
      alert("✅ 請假登記成功！");
      btn.innerText = "送出請假申請"; btn.disabled = false;
      switchView('view-home');
    });
  }

  function fetchPendingLeaves() {
    const listDiv = document.getElementById('pending-leaves-list');
    listDiv.innerHTML = "<div class='empty-state'>載入中...</div>";
    fetch(`${APP_URL}?action=getPendingLeaves`).then(res => res.json()).then(data => {
      if (data.length === 0) { listDiv.innerHTML = "<div class='empty-state'>目前無待領取代課</div>"; return; }

      // 🌟 排序修正：日期 > 時段 > 原老師
      data.sort((a, b) => {
        if (a.日期 !== b.日期) return a.日期.localeCompare(b.日期);
        if (a.時段 !== b.時段) return a.時段.localeCompare(b.時段);
        return a.原老師.localeCompare(b.原老師);
      });

      let html = "";
      data.forEach(item => {
        let rawData = JSON.stringify(item).replace(/'/g, "&#39;");
        html += `<label class="list-item">
          <input type="checkbox" class="chk-claim" data-raw='${rawData}'>
          <div class="item-details">
            <div class="item-date">${item["日期"]} ${item["時段"]}</div>
            <div class="item-course">${item["課程"]}</div>
            <div class="item-teacher">原指導者：${item["原老師"]}</div>
          </div>
        </label>`;
      });
      listDiv.innerHTML = html;
    });
  }

  function submitClaim() {
    const subTeacher = document.getElementById('claim-teacher-select').value;
    const chks = document.querySelectorAll('.chk-claim:checked');
    if (!subTeacher) return alert("請選擇代課老師（您自己）！");
    if (chks.length === 0) return alert("請勾選要領取的課程！");

    const btn = document.querySelector('#view-claim .btn-primary');
    btn.innerText = "處理中..."; btn.disabled = true;

    const items = Array.from(chks).map(el => JSON.parse(el.getAttribute('data-raw')));
    const url = `${APP_URL}?action=submitClaim&subTeacher=${encodeURIComponent(subTeacher)}&items=${encodeURIComponent(JSON.stringify(items))}`;

    fetch(url, { mode: 'no-cors' }).then(() => {
      alert("✅ 成功領取！感謝您的支援！");
      btn.innerText = "確認領取勾選課程"; btn.disabled = false;
      fetchPendingLeaves();
    });
  }

  function fetchMySubs() {
    const teacher = document.getElementById('mysub-teacher-select').value;
    const listDiv = document.getElementById('my-subs-list');
    if (!teacher) { listDiv.innerHTML = "<div class='empty-state'>請先選擇名字</div>"; return; }

    listDiv.innerHTML = "<div class='empty-state'>查詢中...</div>";
    fetch(`${APP_URL}?action=getMySubs&name=${encodeURIComponent(teacher)}`)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) { listDiv.innerHTML = "<div class='empty-state'>您目前沒有代課紀錄</div>"; return; }
        let html = "";
        data.forEach(item => {
          html += `<div class="list-item" style="cursor: default; border-color: transparent; background: #FAFAFB;">
              <div class="item-details">
                <div class="item-date">${item["日期"]} ${item["時段"]}</div>
                <div class="item-course">${item["課程"]}</div>
                <div class="item-teacher">原指導者：${item["原老師"]}</div>
              </div>
            </div>`;
        });
        listDiv.innerHTML = html;
      });
  }
</script>
</body>
</html>
