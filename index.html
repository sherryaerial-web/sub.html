<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sherry Aerial Studio | 代課系統</title>
  <style>
    /* 質感粉色系與變數設定 */
    :root {
      --primary: #d687a6;
      --primary-hover: #c47392;
      --bg: #fdf5f8;
      --card-bg: #ffffff;
      --text-main: #4a4a4a;
      --text-sub: #888888;
      --border: #f0dbe5;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .app-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(214, 135, 166, 0.15);
      padding: 30px;
      box-sizing: border-box;
      margin-top: 10px;
    }

    h1 {
      text-align: center;
      color: var(--primary);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* 首頁按鈕設計 */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-menu {
      background-color: var(--bg);
      color: var(--primary);
      border: 2px solid var(--border);
      margin-bottom: 15px;
    }

    .btn-menu:hover {
      border-color: var(--primary);
      background-color: #fffafc;
      transform: translateY(-2px);
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(214, 135, 166, 0.3);
      margin-top: 20px;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-back {
      background-color: #f1f1f1;
      color: #666;
      width: auto;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .btn-back:hover { background-color: #e4e4e4; }

    /* 標題與表單 */
    h2 { font-size: 18px; color: var(--text-main); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; color: var(--text-sub); margin-bottom: 8px; font-weight: bold; }

    /* 客製化下拉選單 */
    select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: var(--text-main);
      background-color: white;
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23d687a6%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 15px top 50%;
      background-size: 12px auto;
    }
    select:focus { border-color: var(--primary); }

    /* 清單與核取方塊設計 */
    .list-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border: 2px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .list-item:hover { border-color: var(--primary); background: var(--bg); }
    
    .list-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 15px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .item-details { flex-grow: 1; line-height: 1.5; }
    .item-date { font-weight: bold; color: var(--primary); font-size: 15px; }
    .item-course { font-size: 15px; color: var(--text-main); font-weight: bold;}
    .item-teacher { font-size: 13px; color: var(--text-sub); }

    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .active-view { display: block; }
    
    .empty-state { text-align: center; padding: 30px 10px; color: var(--text-sub); font-size: 15px; background: #fdfdfd; border-radius: 10px; border: 1px dashed #ccc; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app-container">
  <h1>Sherry Aerial Studio 🎀</h1>

  <!-- 首頁分流選單 -->
  <div id="view-home" class="view-section active-view">
    <button class="btn btn-menu" onclick="switchView('view-leave')">📝 我要請假登記</button>
    <button class="btn btn-menu" onclick="switchView('view-claim')">🙋‍♀️ 尋找與領取代課</button>
    <button class="btn btn-menu" onclick="switchView('view-mysubs')">🔍 查看我的代課紀錄</button>
  </div>

  <!-- 1. 請假登記畫面 -->
  <div id="view-leave" class="view-section">
    <button class="btn btn-back" onclick="switchView('view-home')">🔙 回首頁</button>
    <h2>📝 填寫請假單</h2>
    <div class="form-group">
      <label>請選擇您的名字：</label>
      <select id="leave-teacher-select"><option value="">載入中...</option></select>
    </div>
    <div id="leave-course-list"><div class="empty-state">載入課表中...</div></div>
    <button class="btn btn-primary" onclick="submitLeave()">送出請假單</button>
  </div>

  <!-- 2. 領取代課畫面 -->
  <div id="view-claim" class="view-section">
    <button class="btn btn-back" onclick="switchView('view-home')">🔙 回首頁</button>
    <h2>🙋‍♀️ 領取代課</h2>
    <div class="form-group">
      <label>代課老師（您自己）：</label>
      <select id="claim-teacher-select"><option value="">載入中...</option></select>
    </div>
    <div id="pending-leaves-list"><div class="empty-state">尋找待領取課程中...</div></div>
    <button class="btn btn-primary" onclick="submitClaim()">確認領取勾選課程</button>
  </div>

  <!-- 3. 我的代課查詢畫面 -->
  <div id="view-mysubs" class="view-section">
    <button class="btn btn-back" onclick="switchView('view-home')">🔙 回首頁</button>
    <h2>🔍 我的代課紀錄</h2>
    <div class="form-group">
      <label>查詢老師：</label>
      <select id="mysub-teacher-select" onchange="fetchMySubs()"><option value="">載入中...</option></select>
    </div>
    <div id="my-subs-list"><div class="empty-state">請先選擇名字以查詢紀錄。</div></div>
  </div>

</div>

<script>
  // 🔴🔴🔴 請在這裡換上妳最新部署的 GAS 網址 🔴🔴🔴
  const APP_URL = "https://script.google.com/macros/s/AKfycbyJADHe_DZdNIbfv_KPewAcBekEond-5Fw63i-RWCd1mHl_O9uGAQ-LTnzENZshjnhe/exec";

  function switchView(viewId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
    document.getElementById(viewId).classList.add('active-view');
    if (viewId === 'view-leave') fetchCourseList();
    if (viewId === 'view-claim') fetchPendingLeaves();
  }

  // 載入老師名單 (根據妳的 Excel，欄位改為"指導者")
  window.onload = function() {
    fetch(`${APP_URL}?action=getTeachers`)
      .then(res => res.json())
      .then(data => {
        let optionsHtml = '<option value="">請選擇名字...</option>';
        data.forEach(t => {
          if(t["指導者"]) optionsHtml += `<option value="${t["指導者"]}">${t["指導者"]}</option>`;
        });
        document.getElementById('leave-teacher-select').innerHTML = optionsHtml;
        document.getElementById('claim-teacher-select').innerHTML = optionsHtml;
        document.getElementById('mysub-teacher-select').innerHTML = optionsHtml;
      });
  };

  function fetchCourseList() {
    document.getElementById('leave-course-list').innerHTML = "<div class='empty-state'>載入課表中...</div>";
    fetch(`${APP_URL}?action=getCourseList`)
      .then(res => res.json())
      .then(data => {
        let html = "";
        data.forEach(item => {
          if (!item["日期"]) return;
          let rawData = JSON.stringify(item).replace(/'/g, "&#39;"); // 防止單引號衝突
          html += `
            <label class="list-item">
              <input type="checkbox" class="chk-leave" data-raw='${rawData}'>
              <div class="item-details">
                <div class="item-date">${item["日期"]} | ${item["時間"]}</div>
                <div class="item-course">${item["課程"]}</div>
              </div>
            </label>`;
        });
        document.getElementById('leave-course-list').innerHTML = html || "<div class='empty-state'>目前無課程</div>";
      });
  }

  function submitLeave() {
    const teacher = document.getElementById('leave-teacher-select').value;
    const chks = document.querySelectorAll('.chk-leave:checked');
    if (!teacher) return alert("請選擇名字！");
    if (chks.length === 0) return alert("請勾選要請假的課程！");

    const btn = document.querySelector('#view-leave .btn-primary');
    btn.innerText = "處理中..."; btn.disabled = true;

    const items = Array.from(chks).map(el => JSON.parse(el.getAttribute('data-raw')));
    const url = `${APP_URL}?action=submitLeave&instructor=${encodeURIComponent(teacher)}&items=${encodeURIComponent(JSON.stringify(items))}`;

    fetch(url, { mode: 'no-cors' }).then(() => {
      alert("✅ 請假登記成功！");
      btn.innerText = "送出請假單"; btn.disabled = false;
      switchView('view-home');
    });
  }

  function fetchPendingLeaves() {
    document.getElementById('pending-leaves-list').innerHTML = "<div class='empty-state'>載入中...</div>";
    fetch(`${APP_URL}?action=getPendingLeaves`)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          document.getElementById('pending-leaves-list').innerHTML = "<div class='empty-state'>目前沒有待領取的代課喔！🎉</div>";
          return;
        }
        let html = "";
        data.forEach(item => {
          let rawData = JSON.stringify(item).replace(/'/g, "&#39;");
          html += `
            <label class="list-item">
              <input type="checkbox" class="chk-claim" data-raw='${rawData}'>
              <div class="item-details">
                <div class="item-date">${item["日期"]} | ${item["時段"]}</div>
                <div class="item-course">${item["課程"]}</div>
                <div class="item-teacher">原指導者：${item["原老師"]}</div>
              </div>
            </label>`;
        });
        document.getElementById('pending-leaves-list').innerHTML = html;
      });
  }

  function submitClaim() {
    const subTeacher = document.getElementById('claim-teacher-select').value;
    const chks = document.querySelectorAll('.chk-claim:checked');
    if (!subTeacher) return alert("請選擇代課老師（您自己）！");
    if (chks.length === 0) return alert("請勾選要領取的課程！");

    const btn = document.querySelector('#view-claim .btn-primary');
    btn.innerText = "處理中..."; btn.disabled = true;

    const items = Array.from(chks).map(el => JSON.parse(el.getAttribute('data-raw')));
    const url = `${APP_URL}?action=submitClaim&subTeacher=${encodeURIComponent(subTeacher)}&items=${encodeURIComponent(JSON.stringify(items))}`;

    fetch(url, { mode: 'no-cors' }).then(() => {
      alert("✅ 成功領取！感謝您的支援！");
      btn.innerText = "確認領取勾選課程"; btn.disabled = false;
      fetchPendingLeaves();
    });
  }

  function fetchMySubs() {
    const teacher = document.getElementById('mysub-teacher-select').value;
    const listDiv = document.getElementById('my-subs-list');
    if (!teacher) { listDiv.innerHTML = "<div class='empty-state'>請先選擇名字以查詢紀錄。</div>"; return; }

    listDiv.innerHTML = "<div class='empty-state'>查詢中...</div>";
    fetch(`${APP_URL}?action=getMySubs&name=${encodeURIComponent(teacher)}`)
      .then(res => res.json())
      .then(data => {
        if (data.length === 0) {
          listDiv.innerHTML = "<div class='empty-state'>您目前沒有代課紀錄喔。</div>"; return;
        }
        let html = "";
        data.forEach(item => {
          html += `
            <div class="list-item" style="cursor: default;">
              <div class="item-details">
                <div class="item-date">📅 ${item["日期"]} | ${item["時段"]}</div>
                <div class="item-course">🧘‍♀️ ${item["課程"]}</div>
                <div class="item-teacher">原指導者：${item["原老師"]}</div>
              </div>
            </div>`;
        });
        listDiv.innerHTML = html;
      });
  }
</script>
</body>
</html>
